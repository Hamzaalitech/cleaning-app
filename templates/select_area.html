<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Area</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 40px;
            font-size: 28px;
        }

        .button {
            display: block;
            width: 260px;
            padding: 20px;
            margin: 15px auto;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .main {
            background-color: #2c66aa;
            /* your main blue */
        }

        .bar {
            background-color: #2e7d32;
            /* your bar green */
        }

        .upstairs {
            background-color: #6a1b9a;
        }

        .main:hover {
            background-color: #245892;
        }

        .bar:hover {
            background-color: #276c2b;
        }

        .upstairs:hover {
            background-color: #5a167f;
        }

        .back {
            background-color: #8b5e3c;
        }

        .back:hover {
            background-color: #6f472a;
        }

        .grill {
            background-color: #ffffff;
            color: #c2410c;
            border: 3px solid #c2410c;
        }

        .grill:hover {
            background-color: #fff1e6;
        }

        .back_kitchen {
            background-color: #ffffff;
            color: #6b7280;
            border: 3px solid #6b7280;
        }

        .back_kitchen:hover {
            background-color: #f3f4f6;
        }

        .dishwasher {
            background-color: #ffffff;
            color: #06b6d4;
            border: 3px solid #06b6d4;
        }

        .dishwasher:hover {
            background-color: #ecfeff;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Select Area</h1>

        <a href="/?area=main" class="button main">Main Seating</a>
        <a href="/?area=bar" class="button bar">Bar</a>
        <a href="/?area=upstairs" class="button upstairs">Upstairs</a>
        <a href="/?area=back" class="button back">Back Section</a>
        <a href="/?area=grill" class="button grill">Grill Section</a>
        <a href="/?area=back_kitchen" class="button back_kitchen">Back Kitchen</a>
        <a href="/?area=dishwasher" class="button dishwasher">Dishwasher</a>
    </div>

    <script>
        let inactivityTimer;

        function resetTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                fetch("/lock-session", { method: "POST" });
                window.location.href = "/pin";
            }, 5000);
        }

        ["click", "touchstart", "mousemove", "keydown"].forEach(event => {
            document.addEventListener(event, resetTimer);
        });

        resetTimer();
    </script>
</body>

</html>
