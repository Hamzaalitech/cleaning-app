<!DOCTYPE html>
<html>

<head>
    <title>Weekly Cleaning</title>

    <style>
        .tableWrap {
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(44, 102, 170, 0.10);
            background-color: white;
            padding: 0 0 6px 0;
            margin-top: 16px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(90deg, #2c66aa, #4a90e2);
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .weeklyThumb {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        .imageOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .imageOverlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .closeBtn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }

        .weeklyThumbWrap {
            position: relative;
            display: inline-block;
        }

        .weeklyDeleteBtn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <h1>Weekly Cleaning Checklist</h1>

    <p>Selected area: {{ area }}</p>

    <div class="tableWrap">
        <table>
            <thead>
                <tr>
                    <th>Task</th>
                    <th>Responsible</th>
                    <th>Photo Proof</th>
                    <th>Done</th>
                    <th>Manager Check</th>
                    <th>Manager Photo</th>
                </tr>
            </thead>
            <tbody>

                {% for item in tasks %}
                <tr>
                    <td>{{ item.task or item.task_name }}</td>
                    <td>{{ item.staff or "—" }}</td>
                    <td>
                        {% if item.staff_photo %}
                        <div class="weeklyThumbWrap">
                            <img src="{{ url_for('static', filename='uploads/' ~ item.staff_photo) }}"
                                class="weeklyThumb" onclick="openWeeklyImage(this.src)">
                            <button class="weeklyDeleteBtn"
                                onclick="deleteWeeklyPhoto('{{ item.task_name }}')">✕</button>
                        </div>
                        {% else %}
                        <input type="file" accept="image/*" onchange="uploadWeeklyPhoto(this, '{{ item.task_name }}')">
                        {% endif %}
                    </td>
                    <td>
                        <input type="checkbox" {% if item.done %}checked{% endif %} {% if not item.staff_photo
                            %}disabled{% endif %} onchange="markWeeklyDone(this, '{{ item.task_name }}')">
                    </td>
                    <td>
                        <button disabled>✓</button>
                        <button disabled>✗</button>
                    </td>
                    <td>
                        <button disabled>Photo</button>
                    </td>
                </tr>
                {% endfor %}

            </tbody>
        </table>
    </div>

    <script>
        function markWeeklyDone(checkbox, taskName) {

            const previousState = !checkbox.checked;

            fetch("/weekly-done", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: new URLSearchParams({
                    task: taskName,
                    area: "{{ area }}",
                    done: checkbox.checked ? "true" : "false"
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        alert("Error saving");
                        checkbox.checked = previousState;
                    }
                })
                .catch(() => {
                    alert("Network error");
                    checkbox.checked = previousState;
                });
        }

        function uploadWeeklyPhoto(input, taskName) {

            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("photo", file);
            formData.append("task", taskName);
            formData.append("area", "{{ area }}");

            fetch("/weekly-upload-staff-photo", {
                method: "POST",
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        alert("Upload failed");
                        input.value = "";
                    } else {
                        location.reload(); // simplest safe refresh
                    }
                })
                .catch(() => {
                    alert("Network error");
                    input.value = "";
                });
        }

        function openWeeklyImage(src) {
            document.getElementById("weeklyOverlayImg").src = src;
            document.getElementById("weeklyImageOverlay").style.display = "flex";
        }

        function deleteWeeklyPhoto(taskName) {
            fetch("/weekly-delete-staff-photo", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    task: taskName,
                    area: "{{ area }}"
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        alert("Delete failed");
                    } else {
                        location.reload();
                    }
                })
                .catch(() => {
                    alert("Network error");
                });
        }
    </script>
    <div id="weeklyImageOverlay" class="imageOverlay">
        <span onclick="document.getElementById('weeklyImageOverlay').style.display='none'" class="closeBtn">✕</span>
        <img id="weeklyOverlayImg">
    </div>
</body>

</html>
